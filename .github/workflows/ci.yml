name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: saas_churn
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Hrithiksd@18
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: saas_churn
      DB_USER: postgres
      DB_PASSWORD: Hrithiksd@18
      MLFLOW_TRACKING_URI: http://127.0.0.1:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pytest httpx

      - name: Create .env file
        run: |
          cat > .env << EOF
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=saas_churn
          DB_USER=postgres
          DB_PASSWORD=Hrithiksd@18
          MLFLOW_TRACKING_URI=http://127.0.0.1:5000
          EOF

      - name: Create required data directories
        run: |
          mkdir -p data/processed
          mkdir -p data/interim
          mkdir -p models

      - name: Run data ingestion
        run: python -m src.data_ingestion.load_data

      - name: Run feature engineering
        run: python -m src.feature_engineering.build_features

      - name: Start MLflow server
        run: |
          mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlruns &
          echo "Waiting for MLflow to start..."
          sleep 15
          curl --retry 5 --retry-delay 3 --retry-connrefused \
            http://127.0.0.1:5000/api/2.0/mlflow/experiments/list \
            -o /dev/null -s -w "MLflow status: %{http_code}\n"

      - name: Run model training
        run: python -m src.training.train

      - name: Run drift detection
        run: python -m src.drift_detection.detect_drift

      - name: Run unit tests
        run: pytest tests/ -v --tb=short