project:
  name: saas_churn_mlops

data:
  observation_window_days: 90
  prediction_window_days: 30

features:
  version: v2

model:
  type: xgboost
  max_depth: 4
  learning_rate: 0.05
  n_estimators: 300
  min_child_weight: 3
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 1
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
 
training:
  test_size: 0.2
